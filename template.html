<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Coding News</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-muted: #8888a0;
    --accent: #d4a574;
    --accent2: #7c9de0;
    --accent3: #6bc9a0;
    --red: #e07070;
    --purple: #b08cdb;
    --orange: #e0a050;
    --tag-feature: #d4a574;
    --tag-security: #e07070;
    --tag-plugin: #b08cdb;
    --tag-mcp: #7c9de0;
    --tag-hooks: #6bc9a0;
    --tag-ide: #e0a050;
    --tag-perf: #88b8d0;
    --tag-agentic: #d47ca0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 20px;
  }

  header {
    padding: 60px 0 30px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  header .period {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
    padding: 0 10px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  .filter-btn[data-filter="security"].active { background: var(--tag-security); }
  .filter-btn[data-filter="plugin"].active { background: var(--tag-plugin); }
  .filter-btn[data-filter="mcp"].active { background: var(--tag-mcp); }
  .filter-btn[data-filter="hooks"].active { background: var(--tag-hooks); }
  .filter-btn[data-filter="ide"].active { background: var(--tag-ide); }
  .filter-btn[data-filter="perf"].active { background: var(--tag-perf); }
  .filter-btn[data-filter="agentic"].active { background: var(--tag-agentic); }

  /* Significance filter */
  .sig-filters {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 30px;
  }

  .sig-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
    font-family: inherit;
  }

  .sig-btn:hover { border-color: var(--accent2); color: var(--text); }
  .sig-btn.active { background: var(--accent2); color: #0a0a0f; border-color: var(--accent2); font-weight: 600; }

  /* Search */
  .search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
  }

  .search-box input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }

  /* Month separator */
  .month-sep {
    text-align: center;
    padding: 24px 0 16px;
    position: relative;
  }

  .month-sep::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: var(--border);
  }

  .month-sep span {
    background: var(--bg);
    padding: 4px 20px;
    position: relative;
    color: var(--accent);
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 28px; }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--accent), var(--border) 20%, var(--border) 80%, transparent);
  }

  .entry {
    position: relative;
    margin-bottom: 20px;
    transition: opacity 0.3s;
  }

  .entry.hidden { display: none; }

  .entry::before {
    content: '';
    position: absolute;
    left: -23px;
    top: 18px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--bg);
    z-index: 1;
  }

  .entry[data-sig="major"]::before { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .entry[data-sig="notable"]::before { background: var(--accent2); }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    transition: border-color 0.2s;
  }

  .entry[data-sig="major"] .entry-card { border-color: rgba(212, 165, 116, 0.3); }

  .entry-card:hover { border-color: var(--accent); }

  .entry-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .entry-version {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    background: rgba(212, 165, 116, 0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .entry-date {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .entry-sig {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 1px 8px;
    border-radius: 10px;
  }

  .sig-major { background: rgba(212, 165, 116, 0.2); color: var(--accent); }
  .sig-notable { background: rgba(124, 157, 224, 0.15); color: var(--accent2); }
  .sig-minor { background: rgba(136, 136, 160, 0.1); color: var(--text-muted); }

  .entry-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .entry-body {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .entry-body ul {
    padding-left: 18px;
    margin: 6px 0;
  }

  .entry-body li { margin-bottom: 4px; }

  .entry-body code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8rem;
    background: rgba(212, 165, 116, 0.1);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }

  .tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .tag-feature { background: rgba(212, 165, 116, 0.15); color: var(--tag-feature); }
  .tag-security { background: rgba(224, 112, 112, 0.15); color: var(--tag-security); }
  .tag-plugin { background: rgba(176, 140, 219, 0.15); color: var(--tag-plugin); }
  .tag-mcp { background: rgba(124, 157, 224, 0.15); color: var(--tag-mcp); }
  .tag-hooks { background: rgba(107, 201, 160, 0.15); color: var(--tag-hooks); }
  .tag-ide { background: rgba(224, 160, 80, 0.15); color: var(--tag-ide); }
  .tag-perf { background: rgba(136, 184, 208, 0.15); color: var(--tag-perf); }
  .tag-agentic { background: rgba(212, 124, 160, 0.15); color: var(--tag-agentic); }

  /* Plugins section */
  .plugins-section {
    margin-top: 40px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
  }

  .plugins-section h2 {
    text-align: center;
    font-size: 1.3rem;
    margin-bottom: 8px;
    color: var(--tag-plugin);
  }

  .plugins-section .section-sub {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .plugin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .plugin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .plugin-card:hover { border-color: var(--tag-plugin); }

  .plugin-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 4px;
  }

  .plugin-author {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .plugin-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .plugin-stat {
    font-size: 0.72rem;
    color: var(--accent);
    margin-top: 8px;
  }

  .plugin-category-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    margin-top: 24px;
  }

  footer {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .stats-bar { gap: 20px; }
    .stat-num { font-size: 1.2rem; }
    .timeline { padding-left: 22px; }
    .entry::before { left: -18px; }
    .entry-card { padding: 12px 14px; }
    .plugin-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Agentic Coding News</h1>
    <p class="subtitle">Every official feature, release, and update</p>
    <p class="period">{{PERIOD}}</p>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="feature">Features</button>
    <button class="filter-btn" data-filter="security">Security</button>
    <button class="filter-btn" data-filter="plugin">Plugins & Skills</button>
    <button class="filter-btn" data-filter="mcp">MCP</button>
    <button class="filter-btn" data-filter="hooks">Hooks</button>
    <button class="filter-btn" data-filter="ide">IDE</button>
    <button class="filter-btn" data-filter="perf">Performance</button>
    <button class="filter-btn" data-filter="agentic">Agentic</button>
  </div>

  <div class="sig-filters">
    <button class="sig-btn active" data-sig="all">All levels</button>
    <button class="sig-btn" data-sig="major">Major only</button>
    <button class="sig-btn" data-sig="notable">Notable+</button>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search features, versions, keywords..." />
  </div>

  <div class="no-results" id="noResults">No entries match your filters.</div>

  <div class="timeline" id="timeline">

    {{ENTRIES}}

  </div>

  
  <div class="plugins-section">
    {{ECOSYSTEM}}
  </div>

  <footer>
    <p>Agentic Coding News &middot; Data sourced from official changelog, GitHub releases, and community reports</p>
    <p>Last updated: {{LAST_UPDATED}}</p>
  </footer>
</div>

<script>
(function() {
  const timeline = document.getElementById('timeline');
  const entries = Array.from(timeline.querySelectorAll('.entry'));
  const filterBtns = document.querySelectorAll('.filter-btn');
  const sigBtns = document.querySelectorAll('.sig-btn');
  const searchInput = document.getElementById('search');
  const noResults = document.getElementById('noResults');

  let activeFilter = 'all';
  let activeSig = 'all';
  let searchTerm = '';

  function applyFilters() {
    let visible = 0;
    entries.forEach(entry => {
      const tags = entry.dataset.tags || '';
      const sig = entry.dataset.sig || '';
      const text = entry.textContent.toLowerCase();

      let show = true;

      // Tag filter
      if (activeFilter !== 'all' && !tags.includes(activeFilter)) show = false;

      // Significance filter
      if (activeSig === 'major' && sig !== 'major') show = false;
      if (activeSig === 'notable' && sig === 'minor') show = false;

      // Search
      if (searchTerm && !text.includes(searchTerm)) show = false;

      entry.classList.toggle('hidden', !show);
      if (show) visible++;
    });

    // Show/hide month separators based on visible entries
    const monthSeps = timeline.querySelectorAll('.month-sep');
    monthSeps.forEach(sep => {
      let next = sep.nextElementSibling;
      let hasVisible = false;
      while (next && !next.classList.contains('month-sep')) {
        if (next.classList.contains('entry') && !next.classList.contains('hidden')) {
          hasVisible = true;
          break;
        }
        next = next.nextElementSibling;
      }
      sep.style.display = hasVisible ? '' : 'none';
    });

    noResults.style.display = visible === 0 ? 'block' : 'none';
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  sigBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      sigBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSig = btn.dataset.sig;
      applyFilters();
    });
  });

  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value.toLowerCase().trim();
    applyFilters();
  });
})();
</script>

</body>
</html>
